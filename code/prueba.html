<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dos Navbars con Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Para que la barra lateral ocupe toda la altura */
        .sidebar {
            height: 100vh; /* Toda la altura de la pantalla */
            background-color: #f8f9fa; /* Color claro */
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Navbar Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar Superior</a>
        </div>
    </nav>

    <!-- Contenedor Principal -->
    <div class="container-fluid">
        <div class="row">
            <!-- Barra Lateral Izquierda -->
            <nav class="col-md-2 col-lg-2 d-flex flex-column sidebar">
                <a href="#" class="nav-link">Inicio</a>
                <a href="#" class="nav-link">Perfil</a>
                <a href="#" class="nav-link">Configuración</a>
            </nav>

            <!-- Contenido Principal -->
            <main class="col-md-10 col-lg-10 p-4">
                <h1>Bienvenido</h1>
                <p>Aquí irá el contenido principal.</p>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS (Opcional si necesitas funcionalidad extra) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
