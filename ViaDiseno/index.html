<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario con ícono de búsqueda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Oswald:wght@200..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>

<div class="container-fluid">
  <!-- Navbar vertical -->
  <div class="navbar-vertical">
    <nav>
        <img src="imagenes/logo.png" class="img-fluid" alt="Responsive image">
        <h4>Menu</h4>
        <div class="nav-item">
            <i class="bi bi-bookmark-fill"></i><a href="#" class="nav-link">Horario</a>
        </div>
        <div class="nav-item">
            <i class="bi bi-calendar-fill"></i><a href="#" class="nav-link">Calendario</a>
        </div>
        <br> <br> <br> <br> <br> <br> <br> <br> <br>
        <h4>General</h4>
        <div class="nav-item">
            <i class="bi bi-person-raised-hand"></i><a href="#" class="nav-link">Ayuda</a>
        </div>
        <div class="nav-item">
            <i class="bi bi-arrow-left-square-fill"></i><a href="#" class="nav-link">Cerrar sesión</a>
        </div>
    </nav>
  </div>

  <!-- Parte horizontal -->
  <div class="columna-principal">

    <!-- Navbar horizontal -->
    <div class="navbar-horizontal">

        <!-- Barra de búsqueda a la izquierda -->
        <form class="d-flex" role="search">
            <div class="input-group">
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <input type="search" class="form-control" placeholder="Buscar" aria-label="Search">
            </div>
        </form>
        
         <!-- Botones y usuario a la derecha -->
         <div class="butn">
            <button type="button" class="btn btn-light">
                <i class="bi bi-envelope-fill"></i>
            </button>
            <button type="button" class="btn btn-light">
                <i class="bi bi-bell-fill"></i>
            </button>
            <button type="button" class="btn btn-light">
                <i class="bi bi-person-fill"></i>
            </button>
            <p class="usuario">Dongju Mun</p>
        </div>
    </div>

     <!-- Main horizontal -->
    <main class="main-container">
        <h1>Horario</h1>
        <p>Aquí ponemos todo lo de horario</p>
    </main>
  </div>
</div>

</body>
</html>
